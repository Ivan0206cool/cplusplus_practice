name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile all exercises
        run: |
          set -e
          while IFS= read -r -d '' f; do
            echo "Compiling $f"
            g++ -std=c++17 -Wall -o /tmp/"$(basename "$f" .cpp)" "$f"
          done < <(find . -name "練習*.cpp" -print0)

  cppcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: |
          find . -name "練習*.cpp" -print0 | xargs -0 cppcheck \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --error-exitcode=1

  readme-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify every exercise is listed in README
        run: |
          set -e
          missing=0
          while IFS= read -r -d '' f; do
            rel="${f#./}"
            if ! grep -qF "]($rel)" README.md; then
              echo "::error file=README.md::Missing entry for $rel in README.md's 題目列表 table"
              missing=1
            fi
          done < <(find . -name "練習*.cpp" -print0)
          exit $missing
